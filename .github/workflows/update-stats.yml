name: update stats and trophies

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats, top languages and trophies as static SVGs
        run: |
          curl -sL "https://github-readme-stats-nine-coral-57.vercel.app/api?username=AmelieGarnier&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d0221&title_color=a78bfa&icon_color=6d28d9&text_color=c4b5fd" -o stats.svg
          curl -sL "https://github-readme-stats-nine-coral-57.vercel.app/api/top-langs/?username=AmelieGarnier&layout=compact&theme=tokyonight&hide_border=true&bg_color=0d0221&title_color=a78bfa&text_color=c4b5fd" -o top-langs.svg
          curl -sL "https://github-profile-trophy-psi-virid.vercel.app/?username=AmelieGarnier&theme=algolia&no-frame=true&column=4&margin-w=10&margin-h=10" -o trophies.svg

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg trophies.svg
          git diff --staged --quiet || git commit -m "chore: refresh stats and trophies"
          git push
